name: Build LaTeX and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build PDF with pLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: papers/infinitude-of-primes
          args: -pdfdvi -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Prepare public site
        run: |
          mkdir -p _site/papers/infinitude-of-primes
          cp index.html styles.css _site/
          cp papers/infinitude-of-primes/main.tex _site/papers/infinitude-of-primes/
          cp papers/infinitude-of-primes/main.pdf _site/papers/infinitude-of-primes/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
