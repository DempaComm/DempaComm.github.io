name: Build LaTeX and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Verify protected source files and catalog
        run: |
          python3 scripts/paper_tool.py verify
          python3 scripts/paper_tool.py catalog --check
          python3 scripts/migration_ledger.py check

      - name: Select manifest-approved TeX roots
        id: latex-roots
        run: |
          for engine in platex uplatex pdflatex lualatex xelatex; do
            {
              echo "${engine}<<EOF"
              python3 scripts/paper_tool.py build-roots --engine "$engine"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          done

      - name: Build PDF with pLaTeX
        if: steps.latex-roots.outputs.platex != ''
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ steps.latex-roots.outputs.platex }}
          work_in_root_file_dir: true
          args: -pdfdvi -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Build PDF with upLaTeX
        if: steps.latex-roots.outputs.uplatex != ''
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ steps.latex-roots.outputs.uplatex }}
          work_in_root_file_dir: true
          args: -pdfdvi -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Build PDF with pdfLaTeX
        if: steps.latex-roots.outputs.pdflatex != ''
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ steps.latex-roots.outputs.pdflatex }}
          work_in_root_file_dir: true
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Build PDF with LuaLaTeX
        if: steps.latex-roots.outputs.lualatex != ''
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ steps.latex-roots.outputs.lualatex }}
          work_in_root_file_dir: true
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode
          latexmk_use_lualatex: true

      - name: Build PDF with XeLaTeX
        if: steps.latex-roots.outputs.xelatex != ''
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ steps.latex-roots.outputs.xelatex }}
          work_in_root_file_dir: true
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode
          latexmk_use_xelatex: true

      - name: Prepare public site
        run: python3 scripts/paper_tool.py stage _site

      - name: Check public links
        run: python3 scripts/paper_tool.py check-links _site

      - name: Verify public site snapshot
        run: python3 scripts/site_snapshot.py check _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
