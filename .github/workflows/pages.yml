name: Build LaTeX and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build PDF with pLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            papers/infinitude-of-primes/main.tex
            papers/sphere-fundamental-group/main.tex
            papers/urysohn-universal-spaces/main.tex
            papers/power-series-notes/main.tex
          work_in_root_file_dir: true
          args: -pdfdvi -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Prepare public site
        run: |
          mkdir -p \
            _site/papers/infinitude-of-primes \
            _site/papers/sphere-fundamental-group \
            _site/papers/urysohn-universal-spaces \
            _site/papers/power-series-notes
          cp index.html styles.css _site/
          cp papers/infinitude-of-primes/{main.tex,main.pdf,README.md} _site/papers/infinitude-of-primes/
          cp papers/sphere-fundamental-group/{main.tex,main.pdf,README.md,Figures.pdf} _site/papers/sphere-fundamental-group/
          cp papers/urysohn-universal-spaces/{main.tex,main.pdf,README.md} _site/papers/urysohn-universal-spaces/
          cp papers/power-series-notes/{main.tex,main.pdf,README.md,ps.bib,myplaindoidoi.bst} _site/papers/power-series-notes/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
